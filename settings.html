<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>settings</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:Inter;
  color:white;
  background:transparent;
}

.container {
  padding:20px;
  max-width:420px;
}

.section {
  margin-bottom:18px;
  padding:14px;
  border-radius:10px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
}

h2 {
  margin-bottom:16px;
}

input,button {
  width:100%;
  margin-top:8px;
  padding:10px;
  border:none;
  border-radius:6px;
  background:rgba(255,255,255,0.08);
  color:white;
}

button {
  cursor:pointer;
}

.toggle {
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h2>Settings</h2>

<div class="section">
<b>Title</b>
<input id="title" placeholder="Enter title">
<button onclick="saveTitle()">Apply</button>
</div>

<div class="section">
<b>Favicon</b>
<input id="favicon" placeholder="URL or domain (example.com)">
<button onclick="saveFavicon()">Apply</button>
</div>

<div class="section">
<b>Privacy</b>

<button onclick="openBlank()">Open in about:blank</button>

<div class="toggle">
<input type="checkbox" id="leaveToggle">
<label for="leaveToggle">Enable leave warning</label>
</div>

</div>

</div>

<script>
const leave = localStorage.getItem("z_leave");
if(leave === "true"){
  document.getElementById("leaveToggle").checked = true;
  window.onbeforeunload = () => true;
}

function saveTitle(){
  const val = document.getElementById("title").value.trim();
  if(val) localStorage.setItem("z_title", val);
}

function saveFavicon(){
  let val = document.getElementById("favicon").value.trim();
  if(!val) return;

  let url = val.startsWith("http")
    ? val
    : "https://favicon.nextdns.io/" + val;

  localStorage.setItem("z_icon", url);
}

function openBlank(){
  const url = location.origin;

  const win = window.open("about:blank", "_blank");
  win.document.write(`
    <iframe src="${url}" style="border:none;width:100vw;height:100vh;"></iframe>
  `);
}

document.getElementById("leaveToggle").onchange = e => {
  if(e.target.checked){
    localStorage.setItem("z_leave","true");
    window.onbeforeunload = () => true;
  } else {
    localStorage.setItem("z_leave","false");
    window.onbeforeunload = null;
  }
};
</script>

</body>
</html>
